name: route_smart
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

# ══════════════════════════════════════════════════════════════
# Dependencies
# ══════════════════════════════════════════════════════════════

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0


  # ── Networking ────────────────────────────────────────────
  dio: ^5.1.2
  pretty_dio_logger: ^1.2.1
  connectivity_plus: ^7.0.0

  # ── Storage ───────────────────────────────────────────────
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0



  get_it: ^9.2.0

 
  flutter_animate: ^4.5.2
  animate_do: ^4.2.0
  flutter_spinkit: ^5.2.2
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  liquid_glass_bottom_bar: ^0.0.6

  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3

  flutter_dotenv: ^6.0.0
  intl_phone_field: ^3.2.0
  pinput: ^6.0.1
  fluttertoast: ^9.0.0
  visibility_detector: ^0.4.0+2
  jwt_decode: ^0.3.1
  dartz: ^0.10.1

  # ── Fonts ─────────────────────────────────────────────────
  google_fonts: ^8.0.2

  # ── Localization ──────────────────────────────────────────
  flutter_localization: ^0.3.3

  # ── Payment ───────────────────────────────────────────────
  flutter_stripe: 

  # ── Icons ─────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

# ══════════════════════════════════════════════════════════════
# Dev Dependencies
# ══════════════════════════════════════════════════════════════

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ───────────────────────────────────────────────
  flutter_lints: ^5.0.0
  very_good_analysis: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

# ══════════════════════════════════════════════════════════════
# Assets & Fonts
# ══════════════════════════════════════════════════════════════

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - assets/icons/
    - assets/images/
    - lang/ar.json
    - lang/en.json

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
          weight: 400

    - family: Poppins
      fonts:
        - asset: assets/fonts/english/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/english/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/english/poppins/Poppins-Regular.ttf
          weight: 400