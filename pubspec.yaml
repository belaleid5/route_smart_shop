name: route_smart
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0' # ✅ محدث

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.1.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_localization: ^0.3.3
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  intl_phone_field: ^3.2.0
  json_annotation: ^4.9.0
  pinput: ^6.0.1
  pretty_dio_logger: ^1.2.1
  retrofit: ^4.9.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  very_good_analysis: ^10.0.0
  visibility_detector: ^0.4.0+2
  device_preview: ^1.1.0
  animate_do: ^4.2.0
  google_fonts: ^8.0.2


dev_dependencies:
  build_runner: ^2.10.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.6.1
  retrofit_generator: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - assets/icons/
    - assets/images/
    - lang/ar.json
    - lang/en.json

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
          weight: 400
    - family: Poppins
      fonts:
        - asset: assets/fonts/english/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/english/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/english/poppins/Poppins-Regular.ttf
          weight: 400